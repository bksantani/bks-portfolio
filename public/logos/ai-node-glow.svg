<svg width="220" height="220" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central Node -->
  <circle cx="75" cy="75" r="10" fill="#8B5CF6" filter="url(#glow)" />

  <!-- Outer Nodes -->
  <circle cx="75" cy="20" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="120" cy="45" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="135" cy="95" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="110" cy="130" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="40" cy="130" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="15" cy="95" r="6" fill="#0EA5E9" filter="url(#glow)" />
  <circle cx="30" cy="45" r="6" fill="#0EA5E9" filter="url(#glow)" />

  <!-- Connection Lines -->
  <line x1="75" y1="75" x2="75" y2="20" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="120" y2="45" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="135" y2="95" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="110" y2="130" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="40" y2="130" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="15" y2="95" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
  <line x1="75" y1="75" x2="30" y2="45" stroke="#6366F1" stroke-width="2" filter="url(#glow)" />
</svg>